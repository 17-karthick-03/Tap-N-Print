<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Print Kiosk</title>

<style>
body{
  margin:0;
  background:#0a0d14;
  color:#fff;
  font-family:system-ui;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

.card{
  width:520px;
  background:#111827;
  border-radius:28px;
  padding:32px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}

h2{
  font-size:32px;
  margin-bottom:20px;
}

.code{
  font-size:42px;
  letter-spacing:8px;
  margin:20px 0 30px;
}

.pad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.pad button{
  padding:26px;
  font-size:26px;
  border-radius:18px;
  background:#1f2937;
  color:#fff;
  border:none;
}

button.primary{
  margin-top:24px;
  width:100%;
  padding:20px;
  border-radius:20px;
  background:#00f7ff;
  color:#000;
  font-size:22px;
  font-weight:700;
}

.hidden{display:none;}

.details{
  text-align:left;
  margin-top:20px;
  font-size:20px;
  line-height:1.8;
}

.details span{
  color:#00f7ff;
  font-weight:600;
}

#timer{
  position:fixed;
  top:18px;
  right:22px;
  font-size:18px;
  opacity:0.8;
}
</style>
</head>

<body onclick="requestFullScreen()">

<div id="timer" class="hidden">Refreshing in 10s</div>

<!-- ENTER CODE -->
<div class="card" id="enter">
  <h2>Enter Print Code</h2>
  <div class="code" id="code">______</div>

  <div class="pad">
    <button onclick="add(1)">1</button><button onclick="add(2)">2</button><button onclick="add(3)">3</button>
    <button onclick="add(4)">4</button><button onclick="add(5)">5</button><button onclick="add(6)">6</button>
    <button onclick="add(7)">7</button><button onclick="add(8)">8</button><button onclick="add(9)">9</button>
    <button onclick="del()">⌫</button><button onclick="add(0)">0</button><button onclick="check()">✔</button>
  </div>
</div>

<!-- CONFIRM -->
<div class="card hidden" id="confirm">
  <h2>Confirm Print</h2>

  <div class="details">
    <div>Name : <span id="d_name"></span></div>
    <div>File Name : <span id="d_file"></span></div>
    <div>Colour Mode : <span id="d_bw"></span></div>
    <div>Copies : <span id="d_copies"></span></div>
  </div>

  <button class="primary" onclick="printJob()">Proceed to Print</button>
</div>

<!-- MESSAGE -->
<div class="card hidden" id="msg">
  <h2 id="msgText"></h2>
</div>

<script>
let entered="", currentCode="", refreshTimer;

/* Fullscreen */
function requestFullScreen(){
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

/* Keypad */
function add(n){
  if(entered.length<6){
    entered+=n;
    update();
  }
}
function del(){
  entered=entered.slice(0,-1);
  update();
}
function update(){
  document.getElementById("code").innerText =
    entered.padEnd(6,"_");
}

/* Validate */
function check(){
  if(entered.length!==6) return;

  fetch("/kiosk/validate",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:entered})
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.status==="DONE"){
      showMsg("You already received your printout.");
    }else if(d.status==="INVALID"){
      showMsg("Invalid print code.");
    }else{
      currentCode=entered;
      document.getElementById("enter").classList.add("hidden");
      document.getElementById("confirm").classList.remove("hidden");

      document.getElementById("d_name").innerText = d.name;
      document.getElementById("d_file").innerText = d.file.split("/").pop();
      document.getElementById("d_bw").innerText = d.bw === "bw" ? "B&W" : "Colour";
      document.getElementById("d_copies").innerText = d.copies;
    }
  });
}

/* Print */
function printJob(){
  fetch("/kiosk/print",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:currentCode})
  })
  .then(()=>{
    showMsg("Printing started…");
    startRefresh();
  });
}

/* Message + Auto Refresh */
function showMsg(text){
  document.getElementById("enter").classList.add("hidden");
  document.getElementById("confirm").classList.add("hidden");
  document.getElementById("msg").classList.remove("hidden");
  document.getElementById("msgText").innerText = text;
}

function startRefresh(){
  let sec = 10;
  const t = document.getElementById("timer");
  t.classList.remove("hidden");
  t.innerText = `Refreshing in ${sec}s`;

  refreshTimer = setInterval(()=>{
    sec--;
    t.innerText = `Refreshing in ${sec}s`;
    if(sec<=0){
      clearInterval(refreshTimer);
      location.reload();
    }
  },1000);
}
</script>

</body>
</html>
