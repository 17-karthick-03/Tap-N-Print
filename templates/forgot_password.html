<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - PrintOnTime</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Inter", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0a0d14;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card {
        width: 100%;
        max-width: 380px;
        margin: 24px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 22px;
        padding: 32px 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        animation: fade 0.4s ease;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(14px);
        }

        to {
          opacity: 1;
        }
      }

      .brand {
        text-align: center;
        margin-bottom: 28px;
      }

      .brand-name {
        font-size: 22px;
        font-weight: 800;
        background: linear-gradient(135deg, #00f7ff, #0066ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1px;
      }

      .brand-sub {
        font-size: 11px;
        opacity: 0.4;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: rgba(0, 247, 255, 0.1);
        border: 2px solid rgba(0, 247, 255, 0.25);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        margin: 0 auto 20px;
      }

      h2 {
        margin: 0 0 6px;
        font-size: 20px;
        text-align: center;
      }

      .subtitle {
        font-size: 13px;
        opacity: 0.5;
        text-align: center;
        line-height: 1.6;
        margin-bottom: 24px;
      }

      .input-wrap {
        position: relative;
        margin-bottom: 18px;
      }

      .input-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        opacity: 0.4;
      }

      input {
        width: 100%;
        padding: 14px 14px 14px 40px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0f172a;
        color: #fff;
        outline: none;
        font-size: 14px;
      }

      input:focus {
        border-color: #00f7ff;
        box-shadow: 0 0 0 2px rgba(0, 247, 255, 0.2);
      }

      .error-box {
        background: rgba(255, 77, 77, 0.12);
        border: 1px solid rgba(255, 77, 77, 0.3);
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 13px;
        color: #ff6b6b;
        margin-bottom: 16px;
      }

      button.primary {
        width: 100%;
        padding: 14px;
        border-radius: 16px;
        border: none;
        background: linear-gradient(135deg, #00f7ff, #0066ff);
        color: #000;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
        margin-bottom: 14px;
      }

      button.primary:active {
        transform: scale(0.97);
      }

      .back-link {
        display: block;
        text-align: center;
        color: #00f7ff;
        text-decoration: none;
        font-size: 14px;
      }

      @media (min-width: 768px) {
        body {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-name">PrintOnTime</div>
        <div class="brand-sub">Smart Print Kiosk</div>
      </div>

      <div class="icon">🔑</div>

      <h2>Forgot Password</h2>
      <p class="subtitle">
        Enter your registered email and we'll send you an OTP to verify your
        identity.
      </p>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
          />
        </div>

        <button type="submit" class="primary">Send OTP →</button>
      </form>

      <a class="back-link" href="/login">← Back to Login</a>
    </div>

    {% include 'loader.html' %}
  </body>
</html>
