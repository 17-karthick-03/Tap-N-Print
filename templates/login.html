<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - PrintOnTime</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Inter", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0d14;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 22px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 22px;
            padding: 26px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 8px;
        }

        p {
            opacity: 0.7;
            font-size: 14px;
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: #0f172a;
            color: #fff;
            margin-bottom: 14px;
            outline: none;
        }

        input:focus {
            border-color: #00f7ff;
            box-shadow: 0 0 0 2px rgba(0, 247, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #00f7ff, #0066ff);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(.97);
        }

        a {
            color: #00f7ff;
            text-decoration: none;
        }

        .center {
            text-align: center;
            margin-top: 14px;
        }

        /* Desktop block */

        @media (min-width:768px) {
            body {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div class="app">

        <div class="card">

            <h2>Login</h2>
            <p>Access your PrintOnTime account</p>

            <form method="POST">

                <input type="email" name="email" placeholder="Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Login</button>

            </form>

            <div class="center">
                <p>Don't have an account?</p>
                <a href="/signup">Create Account</a>
            </div>

        </div>

    </div>

    {% if error %}
    <script>
        alert("{{ error }}");
    </script>
    {% endif %}

</body>

</html>
