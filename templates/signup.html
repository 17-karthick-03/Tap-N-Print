<!DOCTYPE html>
<html>

<head>

    <title>Sign Up - PrintOnTime</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            font-family: Inter, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0a0d14;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.06);
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: #0f172a;
            color: white;
            margin-bottom: 16px;
            outline: none;
        }

        input:focus {
            border-color: #00f7ff;
            box-shadow: 0 0 0 2px rgba(0, 247, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #00f7ff, #0066ff);
            font-weight: 600;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #00f7ff;
            text-decoration: none;
            font-size: 14px;
        }

        /* Desktop hide */

        @media (min-width:768px) {
            body {
                display: none;
            }
        }
    </style>

</head>

<body>

    <div class="card">

        <h2>Create Account</h2>

        <form method="POST">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="email" name="email" placeholder="Email Address" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Sign Up</button>

        </form>

        <a href="/login">Already have an account?</a>

    </div>

</body>

</html>
