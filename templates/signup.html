<!doctype html>
<html>
  <head>
    <title>Sign Up - PrintOnTime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
        font-family: Inter, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0a0d14;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .card {
        width: 100%;
        max-width: 380px;
        background: rgba(255, 255, 255, 0.06);
        padding: 28px 28px 24px;
        border-radius: 22px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        margin: 20px;
      }

      .brand {
        text-align: center;
        margin-bottom: 24px;
      }

      .brand-name {
        font-size: 22px;
        font-weight: 800;
        background: linear-gradient(135deg, #00f7ff, #0066ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1px;
      }

      .brand-sub {
        font-size: 11px;
        opacity: 0.4;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
      }

      h2 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .subtitle {
        font-size: 13px;
        opacity: 0.5;
        margin-bottom: 22px;
      }

      .input-wrap {
        position: relative;
        margin-bottom: 14px;
      }

      .input-wrap svg {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        opacity: 0.4;
      }

      input {
        width: 100%;
        padding: 14px 14px 14px 40px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0f172a;
        color: white;
        outline: none;
        font-size: 14px;
      }

      input:focus {
        border-color: #00f7ff;
        box-shadow: 0 0 0 2px rgba(0, 247, 255, 0.2);
      }

      .error-box {
        background: rgba(255, 77, 77, 0.12);
        border: 1px solid rgba(255, 77, 77, 0.3);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 13px;
        color: #ff6b6b;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 14px;
        border-radius: 16px;
        border: none;
        background: linear-gradient(135deg, #00f7ff, #0066ff);
        color: #000;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
      }

      button:active {
        transform: scale(0.97);
      }

      a {
        display: block;
        text-align: center;
        margin-top: 16px;
        color: #00f7ff;
        text-decoration: none;
        font-size: 14px;
      }

      @media (min-width: 768px) {
        body {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-name">PrintOnTime</div>
        <div class="brand-sub">Smart Print Kiosk</div>
      </div>

      <h2>Create Account</h2>
      <p class="subtitle">Fill in your details to get started</p>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <input type="text" name="name" placeholder="Full Name" required />
        </div>

        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
          </svg>
          <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
          />
        </div>

        <div class="input-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input
            type="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit">Create Account →</button>
      </form>

      <a href="/login">Already have an account? Login</a>
    </div>
    {% include 'loader.html' %}
  </body>
</html>
